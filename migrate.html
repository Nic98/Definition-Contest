<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DB Migration — Definition Contest</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="whbc-icon.png" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="questions.js"></script>
  <script src="supabase-config.js"></script>
  <style>
    .mig-card { max-width: 640px; margin: 0 auto; }
    .log-box {
      background: #0f172a; color: #94a3b8;
      border-radius: 10px; padding: 16px;
      font-family: monospace; font-size: 0.85rem;
      min-height: 120px; max-height: 340px;
      overflow-y: auto; white-space: pre-wrap;
      margin-bottom: 20px; line-height: 1.5;
    }
    .log-box .ok  { color: #4ade80; }
    .log-box .err { color: #f87171; }
    .log-box .dim { color: #64748b; }
    .mig-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .progress-bar-wrap { background: var(--border); border-radius: 6px; overflow: hidden; height: 8px; margin-bottom: 16px; display: none; }
    .progress-bar-fill { height: 100%; background: var(--primary); transition: width 0.3s; width: 0%; }
  </style>
</head>
<body>
<div class="page-shell">

  <nav class="top-nav">
    <a href="index.html" class="btn-nav">🏠 Home</a>
  </nav>

  <div class="section-header">
    <h2>🔄 Database Migration</h2>
    <p>One-time tool — uploads all questions from questions.js into Supabase</p>
  </div>

  <div class="entry-card mig-card">

    <div style="margin-bottom:16px;">
      <label style="display:block;font-weight:600;margin-bottom:6px;">Admin Password</label>
      <input type="password" id="migPw" class="input-field"
             placeholder="Enter admin password" style="width:100%;box-sizing:border-box;"
             onkeydown="if(event.key==='Enter') runMigration()">
    </div>

    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>

    <div class="log-box" id="logBox">Ready. Enter password and click Start Migration.\n</div>

    <div class="mig-actions">
      <button class="btn btn-primary" onclick="runMigration()">🚀 Start Migration</button>
      <button class="btn btn-ghost"   onclick="checkCount()">📊 Check DB Count</button>
      <button class="btn btn-ghost"   style="color:#dc2626;" onclick="clearDB()">🗑️ Clear All</button>
    </div>

  </div>
</div>
<script>
  const ADMIN_PASSWORD = 'WHBC2025';

  const logEl = document.getElementById('logBox');
  function log(msg, cls) {
    const span = document.createElement('span');
    if (cls) span.className = cls;
    span.textContent = msg + '\n';
    logEl.appendChild(span);
    logEl.scrollTop = logEl.scrollHeight;
  }
  function clearLog() { logEl.innerHTML = ''; }

  function checkPw() {
    if (document.getElementById('migPw').value !== ADMIN_PASSWORD) {
      alert('Incorrect password!');
      return false;
    }
    return true;
  }

  async function checkCount() {
    clearLog();
    log('Querying database…', 'dim');
    try {
      const { count, error } = await getDB()
        .from('questions')
        .select('*', { count: 'exact', head: true });
      if (error) throw error;
      log('✅ Database contains ' + count + ' questions.', 'ok');
    } catch(e) {
      log('❌ ' + e.message, 'err');
    }
  }

  async function clearDB() {
    if (!checkPw()) return;
    if (!confirm('Delete ALL questions from the database? This cannot be undone.')) return;
    clearLog();
    log('Deleting all questions…', 'dim');
    try {
      // Delete everything by matching any non-null id
      const { error } = await getDB()
        .from('questions')
        .delete()
        .not('id', 'is', null);
      if (error) throw error;
      dbClearCache();
      log('✅ All questions deleted.', 'ok');
    } catch(e) {
      log('❌ ' + e.message, 'err');
    }
  }

  async function runMigration() {
    if (!checkPw()) return;
    clearLog();

    // Build rows from questions.js
    const rows = [];
    for (const [subjectKey, qs] of Object.entries(QUESTIONS)) {
      qs.forEach(q => {
        rows.push({
          subject_key: subjectKey,
          type:        q.type,
          q_num:       q.qNum   || null,
          stem:        q.stem,
          answer:      q.answer,
          option_a:    q.optionA || null,
          option_b:    q.optionB || null,
          option_c:    q.optionC || null,
          option_d:    q.optionD || null
        });
      });
      log('📦 ' + subjectKey + ': ' + qs.length + ' questions', 'dim');
    }

    log('\nTotal: ' + rows.length + ' questions to upload.');
    log('Starting upload…\n', 'dim');

    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    progressWrap.style.display = 'block';

    const CHUNK = 200;
    let uploaded = 0;
    try {
      for (let i = 0; i < rows.length; i += CHUNK) {
        const chunk = rows.slice(i, i + CHUNK);
        const { error } = await getDB().from('questions').insert(chunk);
        if (error) throw error;
        uploaded += chunk.length;
        const pct = Math.round(uploaded / rows.length * 100);
        progressFill.style.width = pct + '%';
        log('Uploaded ' + uploaded + ' / ' + rows.length + ' (' + pct + '%)', 'dim');
      }
      dbClearCache();
      log('\n✅ Migration complete! ' + rows.length + ' questions uploaded.', 'ok');
    } catch(e) {
      log('\n❌ Error at row ' + uploaded + ': ' + e.message, 'err');
    }
  }
</script>
</body>
</html>
