<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Round Two — Exam</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../whbc-icon.png" type="image/x-icon">
  <script src="../questions.js"></script>
</head>
<body>

  <!-- ── Fixed timer bar (no back button — back is blocked during exam) ── -->
  <div class="timer-bar" id="timerBar">
    <div>
      <div class="tb-title">Round Two</div>
      <div class="tb-info">
        Class: <strong id="tbClass">—</strong> &nbsp;|&nbsp;
        Judge: <strong id="tbJudge">—</strong>
      </div>
    </div>
    <div class="timer-display" id="timerDisplay">1:00</div>
    <button class="btn-submit" id="submitBtn" onclick="confirmSubmit()" style="white-space:nowrap;">
      Submit All
    </button>
  </div>
  <div class="timer-bar-spacer"></div>

  <!-- ── Question list ────────────────────────────────────────── -->
  <div id="questionList"></div>

  <!-- ── Score overlay ────────────────────────────────────────── -->
  <div class="score-overlay" id="scoreOverlay">
    <div class="score-card">
      <div style="font-size:2rem; margin-bottom:8px;">🏆</div>
      <div class="score-num" id="scoreNum">—</div>
      <div class="score-sub" id="scoreSub" style="margin-bottom:20px;"></div>

      <button class="btn-submit" onclick="downloadResult()" id="downloadBtn"
              style="width:100%; margin-bottom:16px;">
        ⬇️ Download Results
      </button>

      <p style="font-size:0.88rem; color:#6b7280; margin:0 0 12px;">
        What would you like to do next?
      </p>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <button class="btn btn-start" onclick="nextRound()"
                style="flex:1; min-width:120px; line-height:1.4;">
          ▶ Next Round<br>
          <small id="nextRoundLabel" style="font-weight:400; opacity:0.85;"></small>
        </button>
        <button class="btn btn-change" onclick="changeClass()"
                style="flex:1; min-width:120px; color:#1a3a6b;">
          🔄 Change Class
        </button>
        <a href="../index.html" class="btn"
           style="flex:1; min-width:120px; background:#fff; color:#1a3a6b;
                  border:1px solid #c8d3e6; text-align:center;">
          🏠 Home
        </a>
      </div>
    </div>
  </div>

  <script>
    // ── URL params ───────────────────────────────────────────────
    const params    = new URLSearchParams(window.location.search);
    const cls       = params.get('class') || localStorage.getItem('dc_class') || '';
    const judgeName = params.get('name')  || localStorage.getItem('dc_judge') || 'Unknown';

    if (!cls) { window.location.replace('round-two-entry.html'); }

    document.getElementById('tbClass').textContent      = cls;
    document.getElementById('tbJudge').textContent      = judgeName;
    document.getElementById('nextRoundLabel').textContent = cls + ' · ' + judgeName;

    // ── Block browser back button during exam ────────────────────
    history.pushState({ exam: true }, '');
    window.addEventListener('popstate', function () {
      if (!timerDone) history.pushState({ exam: true }, '');
    });

    // ── Build MCQ question list ──────────────────────────────────
    const subjects = getSubjectsForClass(cls);
    const allQ     = [];

    subjects.forEach(subKey => {
      const meta = SUBJECT_META[subKey];
      if (!meta) return;
      (QUESTIONS[subKey] || []).filter(q => q.type === 'mcq').forEach((q, i) => {
        allQ.push({ ...q, subjectKey: subKey, subjectDisplay: meta.display, qIndex: i });
      });
    });

    const answers = {};  // { globalIndex: 'A'|'B'|'C'|'D' }

    // ── Render questions ─────────────────────────────────────────
    const list = document.getElementById('questionList');

    if (!allQ.length) {
      list.innerHTML = `
        <div class="empty-state">
          <p>No MCQ questions available for this class in Round Two.</p>
          <a href="round-two-entry.html" class="btn">← Go Back</a>
        </div>`;
      document.getElementById('timerBar').style.display = 'none';
    } else {
      allQ.forEach((q, gi) => {
        const card = document.createElement('div');
        card.className = 'r2-question';
        card.id = 'q-' + gi;

        const opts = ['A','B','C','D'].map(letter => {
          const text = q['option' + letter] || '';
          if (!text) return '';
          return `<button class="opt-btn" data-q="${gi}" data-opt="${letter}"
                    onclick="selectOpt(${gi},'${letter}')">${letter}.&nbsp;${esc(text)}</button>`;
        }).join('');

        card.innerHTML = `
          <div class="q-header">
            <span class="q-num">Q${gi + 1}</span>
            <span class="subject-badge">${esc(q.subjectDisplay)}</span>
          </div>
          <div class="stem">${esc(q.stem)}</div>
          <div class="mcq-opts" id="opts-${gi}">${opts}</div>`;
        list.appendChild(card);
      });
    }

    function esc(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function selectOpt(gi, letter) {
      answers[gi] = letter;
      document.querySelectorAll(`[data-q="${gi}"]`).forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.opt === letter);
      });
    }

    // ── Timer ─────────────────────────────────────────────────────
    const TOTAL  = 60;
    let timeLeft  = TOTAL;
    let timerDone = false;
    let resultData = null;

    const timerEl = document.getElementById('timerDisplay');

    function fmt(s) {
      return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }

    const interval = setInterval(() => {
      timeLeft--;
      timerEl.textContent = fmt(timeLeft);
      if      (timeLeft <= 10) timerEl.className = 'timer-display danger';
      else if (timeLeft <= 20) timerEl.className = 'timer-display warning';
      if (timeLeft <= 0) { clearInterval(interval); autoSubmit(); }
    }, 1000);

    // ── Submit logic ──────────────────────────────────────────────
    function confirmSubmit() {
      if (timerDone) return;
      clearInterval(interval);
      finalize();
    }

    function autoSubmit() {
      if (timerDone) return;
      finalize();
    }

    function finalize() {
      timerDone = true;
      const timeUsed = TOTAL - timeLeft;

      // Highlight correct / wrong and disable buttons
      allQ.forEach((q, gi) => {
        const selected = answers[gi];
        document.querySelectorAll(`[data-q="${gi}"]`).forEach(btn => {
          const opt = btn.dataset.opt;
          if (opt === q.answer)                               btn.classList.add('correct');
          else if (opt === selected && selected !== q.answer) btn.classList.add('wrong');
          btn.disabled = true;
        });
      });

      // Build result JSON
      const answersArr = allQ.map((q, gi) => ({
        subject_key:     q.subjectKey,
        subject_display: q.subjectDisplay,
        stem:            q.stem,
        options:         { A: q.optionA, B: q.optionB, C: q.optionC, D: q.optionD },
        correct_answer:  q.answer,
        student_answer:  answers[gi] || null,
        is_correct:      answers[gi] === q.answer
      }));

      const correct   = answersArr.filter(a => a.is_correct).length;
      const attempted = Object.keys(answers).length;

      resultData = {
        round:             2,
        class:             cls,
        judge:             judgeName,
        submitted_at:      new Date().toISOString(),
        time_used_seconds: timeUsed,
        score:             { correct, attempted, total: allQ.length },
        answers:           answersArr
      };

      document.getElementById('scoreNum').textContent =
        correct + ' / ' + allQ.length;
      document.getElementById('scoreSub').textContent =
        'Attempted ' + attempted + ' of ' + allQ.length + ' questions';
      document.getElementById('scoreOverlay').classList.add('show');

      document.getElementById('submitBtn').disabled    = true;
      document.getElementById('submitBtn').textContent = 'Submitted ✓';
    }

    // ── Post-exam actions ─────────────────────────────────────────
    function downloadResult() {
      if (!resultData) return;
      const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
      const fn = 'R2_' + cls + '_' + judgeName.replace(/\s+/g,'_') + '_' + ts + '.json';
      const blob = new Blob([JSON.stringify(resultData, null, 2)], { type:'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = fn;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);

      const btn = document.getElementById('downloadBtn');
      btn.textContent = '✅ Downloaded';
      btn.disabled    = true;
    }

    // Same class + same judge → replace so no back to finished exam
    function nextRound() {
      location.replace(
        'round-two-v2.html'
        + '?class=' + encodeURIComponent(cls)
        + '&name='  + encodeURIComponent(judgeName)
      );
    }

    // Different class → go to entry form
    function changeClass() {
      location.replace('round-two-entry.html');
    }
  </script>
</body>
</html>
