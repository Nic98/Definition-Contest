<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Round Two — Exam</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../whbc-icon.png" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../questions.js"></script>
  <script src="../supabase-config.js"></script>
  <script src="../image-map.js"></script>
  <style>
    .batch-progress {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .batch-progress .bp-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .bp-dots { display: flex; gap: 5px; }
    .bp-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--border);
      transition: all 0.2s;
    }
    .bp-dot.answered { background: var(--green-light);  border-color: var(--green); }
    .bp-dot.current  { background: var(--purple-light); border-color: var(--purple); animation: dotPulse 1s infinite alternate; }
    @keyframes dotPulse { from { transform: scale(1); } to { transform: scale(1.25); } }

    .next-batch-bar { display: none; text-align: center; padding: 20px 0 8px; }
    .next-batch-bar.show { display: block; }

    .score-modal {
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .score-actions { width: 100%; }
    .score-actions .btn { width: 100%; margin-bottom: 8px; justify-content: center; }
    .score-actions .btn:last-child { margin-bottom: 0; }
    .score-actions .score-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; width: 100%; }
    .score-actions .score-next-label { font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-bottom: 10px; font-weight: 600; }
  </style>
</head>
<body>

  <!-- Timer bar -->
  <div class="timer-bar">
    <div class="tb-left">
      <div class="tb-title">⚡ Round Two</div>
      <div class="tb-info">
        Class: <strong id="tbClass">—</strong>&nbsp;·&nbsp;Judge: <strong id="tbJudge">—</strong>
      </div>
    </div>
    <div class="timer-display" id="timerDisplay">1:00</div>
    <button class="btn btn-purple btn-sm" id="submitBtn" onclick="confirmSubmit()">
      Submit All
    </button>
  </div>
  <div class="timer-bar-spacer"></div>

  <div class="page-shell" style="padding-top:12px;">

    <!-- Loading state -->
    <div id="loadingState" style="text-align:center;padding:80px 20px;color:var(--text-muted);">
      <div style="font-size:2rem;margin-bottom:10px;">⏳</div>
      <p style="font-weight:600;">Loading questions…</p>
    </div>

    <!-- Exam content (hidden until loaded) -->
    <div id="examContent" style="display:none;">
      <div class="batch-progress" id="batchProgress">
        <span class="bp-label" id="batchLabel">Batch 1</span>
        <div class="bp-dots" id="batchDots"></div>
        <span class="bp-label" id="globalProgress" style="margin-left:auto;"></span>
      </div>

      <div id="questionList"></div>

      <div class="next-batch-bar" id="nextBatchBar">
        <button class="btn btn-purple btn-lg" onclick="loadNextBatch()">
          Next 5 Questions →
        </button>
        <p style="font-size:0.82rem;color:var(--text-muted);margin-top:8px;">
          Or wait for the timer — it keeps running!
        </p>
      </div>
    </div>

  </div>

  <!-- Score overlay -->
  <div class="score-overlay" id="scoreOverlay">
    <div class="score-modal">
      <div class="score-emoji" id="scoreEmoji">🏆</div>
      <div class="score-title">Round Two Complete</div>
      <div class="score-big" id="scoreNum">—</div>
      <div class="score-sub" id="scoreSub" style="margin-bottom:20px;"></div>

      <div class="score-actions">
        <button class="btn btn-primary" onclick="downloadResult()" id="downloadBtn">
          ⬇️ Download Results
        </button>
        <hr class="score-divider">
        <div class="score-next-label">What would you like to do next?</div>
        <button class="btn btn-purple" onclick="nextRound()">
          ▶ Next Round &nbsp;<small id="nextRoundLabel" style="font-weight:400;opacity:0.8;"></small>
        </button>
        <button class="btn btn-ghost" onclick="changeClass()">🔄 Change Class</button>
        <a href="../index.html" class="btn btn-ghost">🏠 Home</a>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="Question image">
  </div>

  <script>
    const p         = new URLSearchParams(window.location.search);
    const cls       = p.get('class') || localStorage.getItem('dc_class') || '';
    const judgeName = p.get('name')  || localStorage.getItem('dc_judge') || 'Unknown';

    if (!cls) { window.location.replace('round-two-entry.html'); }

    document.getElementById('tbClass').textContent        = cls;
    document.getElementById('tbJudge').textContent        = judgeName;
    document.getElementById('nextRoundLabel').textContent = cls + ' · ' + judgeName;

    history.pushState({ exam: true }, '');
    window.addEventListener('popstate', () => {
      if (!timerDone) history.pushState({ exam: true }, '');
    });

    // ── Global state ──────────────────────────────────────────────
    const BATCH_SIZE   = 5;
    const TOTAL        = 60;
    let shuffledPool   = [];
    let timerDone      = false;
    let resultData     = null;
    let interval       = null;

    const allAnswered  = {};
    const allDisplayed = [];
    let   batchStart   = 0;
    let   batchNum     = 1;
    let   currentBatch  = [];
    let   batchAnswered = new Set();

    // ── Load questions (Supabase first, fallback to questions.js) ─
    async function initExam() {
      const subjects = getSubjectsForClass(cls);
      const fullPool = [];

      try {
        // Fetch all needed subjects in parallel
        const results = await Promise.all(
          subjects.map(subKey => dbFetchSubject(subKey).then(qs => ({ subKey, qs })))
        );
        results.forEach(({ subKey, qs }) => {
          const meta = SUBJECT_META[subKey];
          if (!meta) return;
          qs.filter(q => q.type === 'mcq').forEach(q => {
            fullPool.push({ ...q, subjectKey: subKey, subjectDisplay: meta.display });
          });
        });
      } catch(e) {
        console.warn('Supabase unavailable, using local data:', e.message);
        subjects.forEach(subKey => {
          const meta = SUBJECT_META[subKey];
          if (!meta) return;
          (QUESTIONS[subKey] || []).filter(q => q.type === 'mcq').forEach(q => {
            fullPool.push({ ...q, subjectKey: subKey, subjectDisplay: meta.display });
          });
        });
      }

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('examContent').style.display  = 'block';

      shuffledPool = shuffle(fullPool);

      const list = document.getElementById('questionList');
      if (!shuffledPool.length) {
        document.getElementById('batchProgress').style.display = 'none';
        list.innerHTML = `
          <div style="text-align:center;padding:80px 20px;color:var(--text-muted);">
            <div style="font-size:3rem;margin-bottom:16px;">📭</div>
            <p style="font-size:1.1rem;font-weight:600;margin-bottom:16px;">
              No MCQ questions for this class in Round Two.
            </p>
            <a href="round-two-entry.html" class="btn btn-ghost">← Go Back</a>
          </div>`;
        document.querySelector('.timer-bar').style.display        = 'none';
        document.querySelector('.timer-bar-spacer').style.display = 'none';
      } else {
        startTimer();
        loadNextBatch();
      }
    }

    // ── Timer ─────────────────────────────────────────────────────
    let timeLeft = TOTAL;
    const timerEl = document.getElementById('timerDisplay');
    function fmt(s) { return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

    function startTimer() {
      interval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = fmt(timeLeft);
        if      (timeLeft <= 10) timerEl.className = 'timer-display danger';
        else if (timeLeft <= 20) timerEl.className = 'timer-display warning';
        if (timeLeft <= 0) { clearInterval(interval); autoSubmit(); }
      }, 1000);
    }

    // ── Shuffle ───────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ── Batch loading ─────────────────────────────────────────────
    function loadNextBatch() {
      document.getElementById('nextBatchBar').classList.remove('show');

      if (batchStart >= shuffledPool.length) {
        const reshuffled = shuffle(shuffledPool);
        shuffledPool.splice(0, shuffledPool.length, ...reshuffled);
        batchStart = 0;
      }

      const slice = shuffledPool.slice(batchStart, batchStart + BATCH_SIZE);
      batchStart += slice.length;
      batchNum++;

      currentBatch  = slice.map((q, i) => ({ q, globalIdx: allDisplayed.length + i }));
      currentBatch.forEach(item => allDisplayed.push(item.q));
      batchAnswered = new Set();

      const list = document.getElementById('questionList');
      list.innerHTML = '';
      currentBatch.forEach(({ q, globalIdx }) => {
        const card = document.createElement('div');
        card.className = 'r2-card';
        card.id        = 'qcard-' + globalIdx;

        const opts = ['A','B','C','D'].map(l => {
          const txt = q['option' + l] || '';
          if (!txt) return '';
          return `<button class="opt-btn" data-gi="${globalIdx}" data-opt="${l}"
                    onclick="selectOpt(${globalIdx},'${l}')">${l}.&nbsp;${esc(txt)}</button>`;
        }).join('');

        const imageKey  = q.subjectKey + '_' + q.qNum;
        const imageFile = (typeof IMAGE_MAP !== 'undefined') ? IMAGE_MAP[imageKey] : undefined;
        const imageHtml = imageFile
          ? `<div class="q-image-wrap">
               <img class="q-image" src="../image/${imageFile}" alt="Question image"
                    onerror="this.parentElement.style.display='none'"
                    onclick="openLightbox('../image/${imageFile}')">
             </div>`
          : '';

        card.innerHTML = `
          <div class="r2-card-header">
            <span class="r2-qnum">Q${globalIdx + 1}</span>
            <span class="r2-subject-badge">${esc(q.subjectDisplay)}</span>
          </div>
          <div class="r2-stem">${esc(q.stem)}</div>
          ${imageHtml}
          <div class="mcq-grid">${opts}</div>`;
        list.appendChild(card);
      });

      updateProgress();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Select option ─────────────────────────────────────────────
    function selectOpt(gi, letter) {
      if (timerDone) return;
      allAnswered[gi] = letter;
      batchAnswered.add(gi);

      document.querySelectorAll(`[data-gi="${gi}"]`).forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.opt === letter);
      });

      updateProgress();

      const allDone = currentBatch.every(({ globalIdx }) => batchAnswered.has(globalIdx));
      if (allDone) {
        document.getElementById('nextBatchBar').classList.add('show');
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      }
    }

    // ── Progress dots ─────────────────────────────────────────────
    function updateProgress() {
      document.getElementById('batchLabel').textContent = 'Batch ' + (batchNum - 1) + ' of 5';

      const dotsEl = document.getElementById('batchDots');
      dotsEl.innerHTML = '';
      currentBatch.forEach(({ globalIdx }, i) => {
        const d = document.createElement('div');
        const answered = batchAnswered.has(globalIdx);
        const firstUnanswered = currentBatch.findIndex(({ globalIdx: gi }) => !batchAnswered.has(gi));
        d.className = 'bp-dot' +
          (answered ? ' answered' : (i === firstUnanswered ? ' current' : ''));
        dotsEl.appendChild(d);
      });

      const total = Object.keys(allAnswered).length;
      const shown = allDisplayed.length;
      document.getElementById('globalProgress').textContent =
        total + ' answered · ' + shown + ' shown';
    }

    // ── Submit ────────────────────────────────────────────────────
    function confirmSubmit() {
      if (timerDone) return;
      clearInterval(interval);
      finalize();
    }
    function autoSubmit() {
      if (timerDone) return;
      finalize();
    }

    function finalize() {
      timerDone = true;
      document.getElementById('nextBatchBar').classList.remove('show');

      currentBatch.forEach(({ q, globalIdx }) => {
        const selected = allAnswered[globalIdx];
        document.querySelectorAll(`[data-gi="${globalIdx}"]`).forEach(btn => {
          const opt = btn.dataset.opt;
          if (opt === q.answer) btn.classList.add('correct');
          else if (opt === selected && selected !== q.answer) btn.classList.add('wrong');
          btn.disabled = true;
        });
      });

      const answersArr = allDisplayed.map((q, gi) => ({
        subject_key:    q.subjectKey,
        subject_display:q.subjectDisplay,
        stem:           q.stem,
        options:        { A:q.optionA, B:q.optionB, C:q.optionC, D:q.optionD },
        correct_answer: q.answer,
        student_answer: allAnswered[gi] || null,
        is_correct:     allAnswered[gi] === q.answer
      }));

      const timeUsed  = TOTAL - timeLeft;
      const attempted = Object.keys(allAnswered).length;
      const correct   = answersArr.filter(a => a.is_correct).length;
      const pct       = attempted ? Math.round(correct / attempted * 100) : 0;

      resultData = {
        round:             2,
        class:             cls,
        judge:             judgeName,
        submitted_at:      new Date().toISOString(),
        time_used_seconds: timeUsed,
        score: { correct, attempted, total: allDisplayed.length, percent: pct },
        answers: answersArr
      };

      logR2(resultData);

      const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '🎯' : pct >= 40 ? '📚' : '💪';
      document.getElementById('scoreEmoji').textContent = emoji;
      document.getElementById('scoreNum').textContent   = correct + ' / ' + attempted;
      document.getElementById('scoreSub').textContent   =
        pct + '% accuracy · ' + allDisplayed.length + ' questions shown · ' + timeUsed + 's';
      document.getElementById('scoreOverlay').classList.add('show');

      document.getElementById('submitBtn').disabled    = true;
      document.getElementById('submitBtn').textContent = 'Submitted ✓';
    }

    // ── Post-exam ─────────────────────────────────────────────────
    function downloadResult() {
      if (!resultData) return;
      const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
      const fn = 'R2_' + cls + '_' + judgeName.replace(/\s+/g,'_') + '_' + ts + '.json';
      const blob = new Blob([JSON.stringify(resultData, null, 2)], { type:'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = fn;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      const btn = document.getElementById('downloadBtn');
      btn.textContent = '✅ Downloaded';
      btn.disabled    = true;
    }

    function nextRound() {
      location.replace('round-two-v2.html'
        + '?class=' + encodeURIComponent(cls)
        + '&name='  + encodeURIComponent(judgeName));
    }
    function changeClass() { location.replace('round-two-entry.html'); }

    function esc(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });

    initExam();
  </script>
</body>
</html>
