<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Round Two — Entry</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../whbc-icon.png" type="image/x-icon">
</head>
<body>
  <nav class="top-nav">
    <button class="btn-nav" onclick="history.back()">← Back</button>
    <a href="../index.html" class="btn-nav">🏠 Home</a>
  </nav>

  <h1>Definition Contest</h1>
  <p style="text-align:center; color:#555; margin-bottom:20px;">Round Two</p>

  <div class="entry-card">
    <h2>Session Setup</h2>
    <p style="color:#555; margin-bottom:20px;">
      Enter the judge's name and the competing class before starting the 60-second round.
    </p>

    <div class="entry-field">
      <label for="classSelect">Class</label>
      <select id="classSelect">
        <option value="">— Select a class —</option>
        <optgroup label="PreDP">
          <option value="PreDP1">PreDP1</option>
          <option value="PreDP2">PreDP2</option>
          <option value="PreDP3">PreDP3</option>
          <option value="PreDP4">PreDP4</option>
        </optgroup>
        <optgroup label="PA">
          <option value="PA1">PA1</option>
          <option value="PA2">PA2</option>
          <option value="PA3">PA3</option>
          <option value="PA4">PA4</option>
          <option value="PA5">PA5</option>
          <option value="PA6">PA6</option>
          <option value="PA7">PA7</option>
          <option value="PA8">PA8</option>
          <option value="PA9">PA9</option>
          <option value="PA10">PA10</option>
          <option value="PA11">PA11</option>
          <option value="PA12">PA12</option>
        </optgroup>
        <optgroup label="Pre-AP">
          <option value="PreAP">PreAP</option>
        </optgroup>
      </select>
    </div>

    <div class="entry-field">
      <label for="judgeName">Judge Name</label>
      <input id="judgeName" type="text" placeholder="Enter judge name" autocomplete="off">
    </div>

    <div id="errorMsg" style="color:#dc2626; min-height:20px; margin-bottom:10px; font-size:0.9rem;"></div>

    <button class="btn-start" onclick="start()">Start Round Two →</button>
  </div>

  <script>
    // Restore saved values
    const savedClass = localStorage.getItem('dc_class');
    const savedJudge = localStorage.getItem('dc_judge');
    if (savedClass) document.getElementById('classSelect').value = savedClass;
    if (savedJudge) document.getElementById('judgeName').value  = savedJudge;

    function start() {
      const cls   = document.getElementById('classSelect').value.trim();
      const judge = document.getElementById('judgeName').value.trim();
      const err   = document.getElementById('errorMsg');

      if (!cls)   { err.textContent = 'Please select a class.';       return; }
      if (!judge) { err.textContent = 'Please enter the judge name.'; return; }
      err.textContent = '';

      localStorage.setItem('dc_class', cls);
      localStorage.setItem('dc_judge', judge);

      window.location.href = 'round-two-v2.html'
        + '?class=' + encodeURIComponent(cls)
        + '&name='  + encodeURIComponent(judge);
    }

    document.getElementById('judgeName').addEventListener('keydown', e => {
      if (e.key === 'Enter') start();
    });
  </script>
</body>
</html>
