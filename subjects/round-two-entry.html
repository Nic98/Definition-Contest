<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definition Contest - Round Two Entry</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../components/creator.js"></script>
    <script src="../components/backbutton.js"></script>
    <link rel="icon" href="../whbc-icon.png" type="image/x-icon">
    <style>
        .entry-card { max-width: 560px; margin: 30px auto; background: #fff; border-radius: 14px; padding: 28px; box-shadow: 0 4px 18px rgba(0,0,0,0.08); }
        .entry-card h2 { margin-top: 0; }
        .entry-field { margin-bottom: 18px; }
        .entry-field label { display: block; font-weight: 700; margin-bottom: 8px; }
        .entry-field select, .entry-field input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .start-btn { padding: 10px 18px; border: none; border-radius: 999px; background: brown; color: white; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Definition Contest - Round Two</h1>
    <div class="entry-card">
        <h2>Judge Information</h2>
        <p>Please enter the judge's name and select the class before starting Round Two.</p>
        <form action="round-two-v2.html" method="get">
            <div class="entry-field">
                <label for="class">Class</label>
                <select id="class" name="class" required>
                    <option value="">Select class</option>
                    <option value="PreDP1">PreDP1</option>
                    <option value="PreDP2">PreDP2</option>
                    <option value="PreDP3">PreDP3</option>
                    <option value="PreDP4">PreDP4</option>
                    <option value="PA1">PA1</option>
                    <option value="PA2">PA2</option>
                    <option value="PA3">PA3</option>
                    <option value="PA4">PA4</option>
                    <option value="PA5">PA5</option>
                    <option value="PA6">PA6</option>
                    <option value="PA7">PA7</option>
                    <option value="PA8">PA8</option>
                    <option value="PA9">PA9</option>
                    <option value="PA10">PA10</option>
                    <option value="PA11">PA11</option>
                    <option value="PreAP">PreAP</option>
                </select>
            </div>
            <div class="entry-field">
                <label for="name">Judge Name</label>
                <input id="name" name="name" type="text" placeholder="Enter judge name" required>
            </div>
            <button class="start-btn" type="submit">Start Round Two</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const judgeName = (params.get('name') || '').trim();
            const nameInput = document.getElementById('name');
            if (nameInput && judgeName) {
                nameInput.value = judgeName;
            }
        });
    </script>
</body>
</html>
