<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Round One — Select Class</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../whbc-icon.png" type="image/x-icon">
</head>
<body>
<div class="page-shell">

  <nav class="top-nav">
    <button class="btn-nav" onclick="history.back()">← Back</button>

    <!-- <a href="../index.html" class="btn-nav">🏠 Home</a> -->
    <img src="../whbc-name.png" class="site-logo" alt="WHBC">
  </nav>

  <div class="section-header">
    <h2>🎯 Round One</h2>
    <p>Select your class to get started</p>
  </div>

  <div class="entry-card">
    <h2>Select Class</h2>
    <p>Choose the competing class before selecting a subject.</p>

    <div class="form-field">
      <label for="classSelect">Class</label>
      <select id="classSelect">
        <option value="">— Select a class —</option>
        <optgroup label="PreDP">
          <option>PreDP1</option><option>PreDP2</option>
          <option>PreDP3</option><option>PreDP4</option>
        </optgroup>
        <optgroup label="PA">
          <option>PA1</option><option>PA2</option><option>PA3</option><option>PA4</option>
          <option>PA5</option><option>PA6</option><option>PA7</option><option>PA8</option>
          <option>PA9</option><option>PA10</option><option>PA11</option><option>PA12</option>
        </optgroup>
        <optgroup label="Pre-AP">
          <option>PreAP</option>
        </optgroup>
      </select>
    </div>

    <div class="form-error" id="err"></div>
    <button class="btn btn-primary btn-full btn-lg" onclick="proceed()">
      Continue to Subjects →
    </button>
  </div>

</div>
<script>
  const saved = localStorage.getItem('dc_class');
  if (saved) document.getElementById('classSelect').value = saved;

  function proceed() {
    const cls = document.getElementById('classSelect').value;
    if (!cls) { document.getElementById('err').textContent = 'Please select a class first.'; return; }
    localStorage.setItem('dc_class', cls);
    window.location.href = 'round-one.html?class=' + encodeURIComponent(cls);
  }
  document.getElementById('classSelect').addEventListener('keydown', e => { if (e.key === 'Enter') proceed(); });
</script>
</body>
</html>
