<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question Bank</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../whbc-icon.png" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../questions.js"></script>
  <script src="../supabase-config.js"></script>
  <script src="../image-map.js"></script>
</head>
<body>
<div class="wide-shell">

  <nav class="top-nav">
    <a href="../index.html" class="btn-nav">🏠 Home</a>
    <a href="admin.html" class="btn-nav" style="margin-left:auto;">⚙️ Admin</a>
  </nav>

  <div class="section-header">
    <h2>📚 Question Bank</h2>
    <p id="bankSubtitle">Loading questions…</p>
  </div>

  <div class="qb-wrap">

    <!-- Sidebar -->
    <div class="qb-sidebar" id="sidebar"></div>

    <!-- Main panel -->
    <div>
      <input class="qb-search" id="searchBox"
             placeholder="Search questions, answers…"
             oninput="render()">

      <div class="qb-toolbar">
        <div class="qb-tabs">
          <button class="qb-tab active" data-t="all"   onclick="setTab('all')">All</button>
          <button class="qb-tab"        data-t="blank" onclick="setTab('blank')">Fill-in</button>
          <button class="qb-tab"        data-t="mcq"   onclick="setTab('mcq')">MCQ</button>
        </div>
        <span class="qb-count" id="qbCount"></span>
      </div>

      <!-- Loading state -->
      <div id="loadingState" style="text-align:center;padding:60px 20px;color:var(--text-muted);font-weight:600;">
        <div style="font-size:2rem;margin-bottom:10px;">⏳</div>
        Loading questions from database…
      </div>

      <div id="qbList"></div>
    </div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="Question image">
</div>

<script>
  const GROUPS = [
    { label:'General',   keys:['CS','BIO','BUS','AD','CHI'] },
    { label:'EAP',       keys:['EAP','EAP-2.5'] },
    { label:'Physics',   keys:['PHY','PHY-2.5'] },
    { label:'Chemistry', keys:['CHE','CHE-2.5'] },
    { label:'Economics', keys:['ECON','ECON-2.5'] },
    { label:'Math',      keys:['MATH-0580','MATH-0606','MATH-0606-2.5','MATH-9709'] }
  ];

  let activeSubject = 'CS';
  let activeTab     = 'all';
  let QDB           = {};   // questions loaded from Supabase (or fallback)

  // ── Init: fetch from Supabase, fall back to questions.js ────────
  async function init() {
    try {
      QDB = await dbFetchAll();
      const total = Object.values(QDB).reduce((s, a) => s + a.length, 0);
      document.getElementById('bankSubtitle').textContent =
        'Browse ' + total + ' questions across every subject';
    } catch(e) {
      console.warn('Supabase unavailable, using local data:', e.message);
      QDB = {};
      for (const [k, qs] of Object.entries(QUESTIONS)) QDB[k] = [...qs];
      const total = Object.values(QDB).reduce((s, a) => s + a.length, 0);
      document.getElementById('bankSubtitle').textContent =
        'Browse ' + total + ' questions (offline mode)';
    }

    document.getElementById('loadingState').style.display = 'none';
    buildSidebar();
    selectSubject('CS');
  }

  // ── Sidebar ─────────────────────────────────────────────────────
  function buildSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = '';
    GROUPS.forEach(g => {
      const lbl = document.createElement('div');
      lbl.className   = 'qb-group-label';
      lbl.textContent = g.label;
      sidebar.appendChild(lbl);
      g.keys.forEach(key => {
        const meta = SUBJECT_META[key];
        if (!meta) return;
        const pool = QDB[key] || [];
        const btn  = document.createElement('button');
        btn.className    = 'qb-subj-btn';
        btn.id           = 'sb-' + key;
        btn.dataset.key  = key;
        btn.textContent  = meta.display + ' (' + pool.length + ')';
        btn.onclick      = () => selectSubject(key);
        sidebar.appendChild(btn);
      });
    });
  }

  function selectSubject(key) {
    activeSubject = key;
    document.querySelectorAll('.qb-subj-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.key === key);
    });
    document.getElementById('searchBox').value = '';
    render();
  }

  function setTab(t) {
    activeTab = t;
    document.querySelectorAll('.qb-tab').forEach(b => {
      b.classList.toggle('active', b.dataset.t === t);
    });
    render();
  }

  // ── Render ───────────────────────────────────────────────────────
  function render() {
    const pool   = QDB[activeSubject] || [];
    const search = document.getElementById('searchBox').value.toLowerCase().trim();

    const filtered = pool.filter(q => {
      if (activeTab !== 'all' && q.type !== activeTab) return false;
      if (search) {
        const hay = [q.stem, q.answer, q.optionA, q.optionB, q.optionC, q.optionD]
          .filter(Boolean).join(' ').toLowerCase();
        if (!hay.includes(search)) return false;
      }
      return true;
    });

    document.getElementById('qbCount').textContent =
      filtered.length + ' of ' + pool.length + ' questions';

    const container = document.getElementById('qbList');
    container.innerHTML = '';

    if (!filtered.length) {
      container.innerHTML = '<div style="text-align:center;padding:50px;color:var(--text-faint);font-weight:600;">No questions found.</div>';
      return;
    }

    filtered.forEach(q => {
      const card = document.createElement('div');
      card.className = 'qb-card ' + q.type;

      let html = `<span class="qb-type-tag ${q.type}">${q.type === 'blank' ? 'Fill-in' : 'MCQ'}</span>
                  <div class="qb-stem">${esc(q.stem)}</div>`;

      if (q.type === 'mcq') {
        html += '<div class="qb-opts-grid">';
        ['A','B','C','D'].forEach(l => {
          const txt = q['option' + l];
          if (!txt) return;
          const isAns = q.answer === l;
          html += `<div style="${isAns?'font-weight:700;color:#15803d;':''}">${l}. ${esc(txt)}</div>`;
        });
        html += '</div>';
        const optText = q['option' + q.answer] || '';
        html += `<span class="qb-answer-tag">✓ ${esc(q.answer)}${optText?' — '+esc(optText):''}</span>`;
      } else {
        html += `<span class="qb-answer-tag">✓ ${esc(q.answer)}</span>`;
      }

      card.innerHTML = html;

      // Image (supports both uploaded image_url and local IMAGE_MAP)
      const imgSrc = getImageSrc(q, activeSubject);
      if (imgSrc) {
        const imgWrap = document.createElement('div');
        imgWrap.className = 'q-image-wrap';
        imgWrap.style.margin = '8px 0';
        imgWrap.innerHTML =
          `<img class="q-image" src="${imgSrc}" alt="Question image"
                onerror="this.parentElement.style.display='none'"
                onclick="openLightbox('${imgSrc}')">`;
        card.appendChild(imgWrap);
      }

      container.appendChild(card);
    });
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });

  init();
</script>
</body>
</html>
