<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question Bank</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../whbc-icon.png" type="image/x-icon">
  <script src="../questions.js"></script>
</head>
<body>
<div class="wide-shell">

  <nav class="top-nav">
    <a href="../index.html" class="btn-nav">🏠 Home</a>
  </nav>

  <div class="section-header">
    <h2>📚 Question Bank</h2>
    <p>Browse all 572 questions across every subject</p>
  </div>

  <div class="qb-wrap">

    <!-- Sidebar -->
    <div class="qb-sidebar" id="sidebar"></div>

    <!-- Main panel -->
    <div>
      <input class="qb-search" id="searchBox"
             placeholder="Search questions, answers…"
             oninput="render()">

      <div class="qb-toolbar">
        <div class="qb-tabs">
          <button class="qb-tab active" data-t="all"   onclick="setTab('all')">All</button>
          <button class="qb-tab"        data-t="blank" onclick="setTab('blank')">Fill-in</button>
          <button class="qb-tab"        data-t="mcq"   onclick="setTab('mcq')">MCQ</button>
        </div>
        <span class="qb-count" id="qbCount"></span>
      </div>

      <div id="qbList"></div>
    </div>
  </div>

</div>
<script>
  const GROUPS = [
    { label:'General',   keys:['CS','BIO','BUS','AD','CHI'] },
    { label:'EAP',       keys:['EAP','EAP-2.5'] },
    { label:'Physics',   keys:['PHY','PHY-2.5'] },
    { label:'Chemistry', keys:['CHE','CHE-2.5'] },
    { label:'Economics', keys:['ECON','ECON-2.5'] },
    { label:'Math',      keys:['MATH-0580','MATH-0606','MATH-0606-2.5','MATH-9709'] }
  ];

  let activeSubject = 'CS';
  let activeTab     = 'all';

  // Build sidebar
  const sidebar = document.getElementById('sidebar');
  GROUPS.forEach(g => {
    const lbl = document.createElement('div');
    lbl.className   = 'qb-group-label';
    lbl.textContent = g.label;
    sidebar.appendChild(lbl);
    g.keys.forEach(key => {
      const meta = SUBJECT_META[key];
      if (!meta) return;
      const pool = QUESTIONS[key] || [];
      const btn  = document.createElement('button');
      btn.className    = 'qb-subj-btn';
      btn.id           = 'sb-' + key;
      btn.dataset.key  = key;
      btn.textContent  = meta.display + ' (' + pool.length + ')';
      btn.onclick      = () => selectSubject(key);
      sidebar.appendChild(btn);
    });
  });

  function selectSubject(key) {
    activeSubject = key;
    document.querySelectorAll('.qb-subj-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.key === key);
    });
    document.getElementById('searchBox').value = '';
    render();
  }

  function setTab(t) {
    activeTab = t;
    document.querySelectorAll('.qb-tab').forEach(b => {
      b.classList.toggle('active', b.dataset.t === t);
    });
    render();
  }

  function render() {
    const pool   = QUESTIONS[activeSubject] || [];
    const search = document.getElementById('searchBox').value.toLowerCase().trim();

    const filtered = pool.filter(q => {
      if (activeTab !== 'all' && q.type !== activeTab) return false;
      if (search) {
        const hay = (q.stem+' '+q.answer+' '+(q.optionA||'')+' '+(q.optionB||'')+' '+(q.optionC||'')+' '+(q.optionD||'')).toLowerCase();
        if (!hay.includes(search)) return false;
      }
      return true;
    });

    document.getElementById('qbCount').textContent =
      filtered.length + ' of ' + pool.length + ' questions';

    const container = document.getElementById('qbList');
    container.innerHTML = '';

    if (!filtered.length) {
      container.innerHTML = '<div style="text-align:center;padding:50px;color:var(--text-faint);font-weight:600;">No questions found.</div>';
      return;
    }

    filtered.forEach(q => {
      const card = document.createElement('div');
      card.className = 'qb-card ' + q.type;

      let html = `<span class="qb-type-tag ${q.type}">${q.type === 'blank' ? 'Fill-in' : 'MCQ'}</span>
                  <div class="qb-stem">${esc(q.stem)}</div>`;

      if (q.type === 'mcq') {
        html += '<div class="qb-opts-grid">';
        ['A','B','C','D'].forEach(l => {
          const txt = q['option' + l];
          if (!txt) return;
          const isAns = q.answer === l;
          html += `<div style="${isAns?'font-weight:700;color:#15803d;':''}">${l}. ${esc(txt)}</div>`;
        });
        html += '</div>';
        const optText = q['option' + q.answer] || '';
        html += `<span class="qb-answer-tag">✓ ${esc(q.answer)}${optText?' — '+esc(optText):''}</span>`;
      } else {
        html += `<span class="qb-answer-tag">✓ ${esc(q.answer)}</span>`;
      }

      card.innerHTML = html;
      container.appendChild(card);
    });
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  selectSubject('CS');
</script>
</body>
</html>
