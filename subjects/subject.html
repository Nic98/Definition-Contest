<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Round One — Question</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../whbc-icon.png" type="image/x-icon">
  <script src="../questions.js"></script>
</head>
<body>
<div class="page-shell">

  <nav class="top-nav">
    <button class="btn-nav" onclick="goBack()">← Back</button>
    <a href="../index.html" class="btn-nav">🏠 Home</a>
  </nav>

  <div class="meta-row">
    <span class="pill">Class: <strong id="classLabel" style="margin-left:4px;">—</strong></span>
    <span class="pill">Subject: <strong id="subjectLabel" style="margin-left:4px;">—</strong></span>
  </div>

  <!-- Question card -->
  <div class="q-card" id="qCard">
    <div class="q-card-header">
      <span class="q-label" id="qTypeLabel">Fill-in</span>
      <span class="q-counter" id="qCounter"></span>
    </div>

    <div class="q-stem" id="stem"></div>

    <!-- MCQ options (CHI only) -->
    <div class="opts-display" id="optsDisplay" style="display:none;"></div>

    <!-- Answer reveal -->
    <div class="answer-reveal" id="answerReveal">
      <div class="ar-label">Answer</div>
      <div class="ar-text" id="answerText"></div>
    </div>

    <div class="q-actions" style="margin-bottom:18px;">
      <button class="btn btn-ghost btn-sm" id="revealBtn" onclick="revealAnswer()">
        🔍 Reveal Answer
      </button>
      <button class="btn btn-ghost btn-sm" onclick="nextQuestion()">
        ↺ New Question
      </button>
    </div>

    <label class="correct-row" for="isCorrect">
      <input type="checkbox" id="isCorrect">
      <span><strong>Mark as Correct</strong> — tick if the student answered correctly</span>
    </label>

    <div class="q-actions">
      <button class="btn btn-primary btn-lg" onclick="submitAnswer()">
        Submit &amp; Next →
      </button>
    </div>
  </div>

  <!-- Error state -->
  <div id="errState" style="display:none; text-align:center; padding:60px 20px; color:var(--text-muted);">
    <div style="font-size:3rem; margin-bottom:12px;">📭</div>
    <p style="font-size:1.1rem; font-weight:600; margin-bottom:16px;">No questions available for this subject.</p>
    <button class="btn btn-ghost" onclick="goBack()">← Go Back</button>
  </div>

</div>
<script>
  const p          = new URLSearchParams(window.location.search);
  const subjectKey = p.get('subject') || '';
  const cls        = p.get('class')   || localStorage.getItem('dc_class') || '';

  if (!cls || !subjectKey) { window.location.href = 'round-one-class.html'; }

  const subjectDisplay = (SUBJECT_META[subjectKey] || {}).display || subjectKey;
  document.getElementById('classLabel').textContent   = cls;
  document.getElementById('subjectLabel').textContent = subjectDisplay;

  // Pool: CHI uses mcq, all others use blank
  const targetType = (subjectKey === 'CHI') ? 'mcq' : 'blank';
  const pool       = (QUESTIONS[subjectKey] || []).filter(q => q.type === targetType);

  let currentQ    = null;
  let usedIndices = new Set();

  function pickQuestion() {
    if (!pool.length) return null;
    if (usedIndices.size >= pool.length) usedIndices.clear();
    let idx;
    let tries = 0;
    do {
      idx = Math.floor(Math.random() * pool.length);
      tries++;
    } while (usedIndices.has(idx) && tries < pool.length * 3);
    usedIndices.add(idx);
    return { q: pool[idx], idx };
  }

  function renderQuestion() {
    const picked = pickQuestion();
    if (!picked) {
      document.getElementById('qCard').style.display  = 'none';
      document.getElementById('errState').style.display = 'block';
      return;
    }
    currentQ = picked;
    const { q, idx } = picked;

    // Type label
    const labelEl = document.getElementById('qTypeLabel');
    labelEl.textContent = q.type === 'blank' ? 'Fill-in-Blank' : 'MCQ';
    labelEl.className   = 'q-label ' + q.type;

    document.getElementById('qCounter').textContent =
      'Q' + (idx + 1) + ' / ' + pool.length;

    document.getElementById('stem').textContent = q.stem;

    // Options (MCQ)
    const optsEl = document.getElementById('optsDisplay');
    optsEl.innerHTML = '';
    if (q.type === 'mcq') {
      optsEl.style.display = 'grid';
      ['A','B','C','D'].forEach(l => {
        const txt = q['option' + l];
        if (!txt) return;
        const d = document.createElement('div');
        d.className   = 'opt-view';
        d.textContent = l + '.  ' + txt;
        optsEl.appendChild(d);
      });
    } else {
      optsEl.style.display = 'none';
    }

    // Reset reveal & checkbox
    document.getElementById('answerReveal').className = 'answer-reveal';
    document.getElementById('revealBtn').style.display = 'inline-flex';
    document.getElementById('isCorrect').checked = false;
  }

  function revealAnswer() {
    const q = currentQ?.q;
    if (!q) return;
    let txt = '';
    if (q.type === 'mcq') {
      const optText = q['option' + q.answer] || '';
      txt = q.answer + ' — ' + optText;
    } else {
      txt = q.answer;
    }
    document.getElementById('answerText').textContent = txt;
    document.getElementById('answerReveal').className = 'answer-reveal show';
    document.getElementById('revealBtn').style.display = 'none';
  }

  function nextQuestion() { renderQuestion(); }

  function submitAnswer() {
    const isCorrect = document.getElementById('isCorrect').checked;
    const q = currentQ?.q;
    if (!q) return;

    const counterKey = 'dc_r1_counter::' + cls;
    const n = (parseInt(localStorage.getItem(counterKey) || '0') || 0) + 1;
    localStorage.setItem(counterKey, String(n));

    const record = {
      round:            1,
      class:            cls,
      subject_key:      subjectKey,
      subject_display:  subjectDisplay,
      submission_number: n,
      stem:             q.stem,
      answer:           q.answer,
      is_correct:       isCorrect,
      submitted_at:     new Date().toISOString()
    };

    // Save to localStorage log
    logR1(record);

    // Also trigger a JSON download so original workflow still works
    const safeClass   = cls.replace(/[^A-Za-z0-9]/g,'_');
    const safeSubject = subjectKey.replace(/[^A-Za-z0-9]/g,'_');
    downloadJSON(record, 'R1_' + safeClass + '_' + n + '_' + safeSubject + '.json');

    // Replace history entry so Back doesn't loop
    setTimeout(() => {
      location.replace('round-one.html?class=' + encodeURIComponent(cls));
    }, 400);
  }

  function downloadJSON(obj, filename) {
    const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function goBack() { history.back(); }

  renderQuestion();
</script>
</body>
</html>
