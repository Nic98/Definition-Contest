<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Round One — Choose Subject</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../whbc-icon.png" type="image/x-icon">
  <script src="../questions.js"></script>
</head>
<body>
<div class="page-shell">

  <nav class="top-nav">
    <button class="btn-nav" onclick="history.back()">← Back</button>
    <a href="../index.html" class="btn-nav">🏠 Home</a>
  </nav>

  <div class="section-header">
    <h2>🎯 Round One</h2>
    <p>Select a subject for this round</p>
  </div>

  <div class="meta-row">
    <span class="pill">Class: <strong id="classLabel" style="margin-left:4px;">—</strong></span>
    <button class="btn btn-ghost btn-sm" onclick="changeClass()">Change Class</button>
  </div>

  <div id="subjectGrid" class="subject-grid"></div>

</div>
<script>
  const SUBJECT_ICONS = {
    "CS":"💻","BIO":"🧬","BUS":"📈","AD":"🎨","CHI":"📜",
    "EAP":"📝","EAP-2.5":"📝","PHY":"⚛️","PHY-2.5":"⚛️",
    "CHE":"🧪","CHE-2.5":"🧪","ECON":"💹","ECON-2.5":"💹",
    "MATH-0580":"📐","MATH-0606":"📐","MATH-0606-2.5":"📐","MATH-9709":"📐"
  };

  const p   = new URLSearchParams(window.location.search);
  const cls = p.get('class') || localStorage.getItem('dc_class') || '';

  if (!cls) { window.location.href = 'round-one-class.html'; }
  else {
    localStorage.setItem('dc_class', cls);
    document.getElementById('classLabel').textContent = cls;
    buildGrid();
  }

  function changeClass() { window.location.href = 'round-one-class.html'; }

  function buildGrid() {
    const subjects = getSubjectsForClass(cls);
    const grid     = document.getElementById('subjectGrid');
    subjects.forEach(key => {
      const meta = SUBJECT_META[key];
      if (!meta) return;
      const a    = document.createElement('a');
      a.href     = 'subject.html?subject=' + encodeURIComponent(key)
                 + '&class=' + encodeURIComponent(cls);
      a.className = 'subj-btn';
      a.innerHTML = `<span class="sb-icon">${SUBJECT_ICONS[key]||'📖'}</span>${meta.display}`;
      grid.appendChild(a);
    });
  }
</script>
</body>
</html>
