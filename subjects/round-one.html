<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Round One — Choose Subject</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../whbc-icon.png" type="image/x-icon">
  <script src="../questions.js"></script>
</head>
<body>
  <nav class="top-nav">
    <button class="btn-nav" onclick="history.back()">← Back</button>
    <a href="../index.html" class="btn-nav">🏠 Home</a>
  </nav>

  <h1>Definition Contest</h1>

  <div class="meta-row">
    <div class="meta-pill">Class: <span id="classLabel">—</span></div>
    <button class="btn-change" onclick="changeClass()" style="font-size:0.85rem; padding:5px 14px;">Change Class</button>
  </div>

  <p style="text-align:center; color:#555; margin-bottom:16px;">
    Select a subject for this round.
  </p>

  <div id="subjectGrid" class="subject-list"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    let cls = params.get('class') || localStorage.getItem('dc_class') || '';

    if (!cls) {
      window.location.href = 'round-one-class.html';
    } else {
      localStorage.setItem('dc_class', cls);
      document.getElementById('classLabel').textContent = cls;
      buildGrid();
    }

    function changeClass() {
      window.location.href = 'round-one-class.html';
    }

    function buildGrid() {
      const subjects = getSubjectsForClass(cls);
      const grid = document.getElementById('subjectGrid');
      grid.innerHTML = '';
      subjects.forEach(key => {
        const meta = SUBJECT_META[key];
        if (!meta) return;
        const a = document.createElement('a');
        a.href = 'subject.html?subject=' + encodeURIComponent(key)
                + '&class=' + encodeURIComponent(cls);
        a.textContent = meta.display;
        a.className = 'round-one-btn';
        grid.appendChild(a);
      });
    }
  </script>
</body>
</html>
